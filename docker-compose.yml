services:
  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: dungeon_master
      MONGO_INITDB_ROOT_PASSWORD: dice_roller
      MONGO_INITDB_DATABASE: dungeon_master
    volumes:
      - mongo-data:/data/db

  whisper-service:
    build:
      context: .
      dockerfile: packages/whisper-service/Dockerfile.rocm
    container_name: dm-whisper
    ports:
      - "8000:8000"
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER__INFERENCE_DEVICE: ${WHISPER_INFERENCE_DEVICE:-cpu}
      WHISPER__COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped

  transcription-service:
    build:
      context: .
      dockerfile: packages/transcription-service/Dockerfile
    container_name: dm-transcription-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-whisper-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_LOCAL_URL: ${WHISPER_LOCAL_URL:-http://whisper-service:8000}
    depends_on:
      - whisper-service
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    container_name: dm-manager-app
    ports:
      - "3000:3000"
    env_file:
      - path: ./packages/app/.env
        required: false
    environment:
      MONGODB_URI: mongodb://dungeon_master:dice_roller@mongodb:27017
      MONGODB_DB: dungeon_master
      REPOSITORY_TYPE: mongo
      TRANSCRIPTION_PROVIDER: transcription-service
      TRANSCRIPTION_SERVICE_URL: http://transcription-service:3002

    depends_on:
      - mongodb
      - transcription-service

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    container_name: dm-manager-bot
    env_file:
      - path: ./packages/bot/.env
        required: false
    environment:
      DM_MANAGER_URL: http://app:3000
    volumes:
      - bot-data:/app/data
    depends_on:
      - app
    restart: unless-stopped

  # ── Monitoring stack ──────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.3.2
    container_name: dm-loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    container_name: dm-promtail
    user: "0"
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: dm-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  mongo-data:
  bot-data:
  loki-data:
  grafana-data:
  whisper-models:
